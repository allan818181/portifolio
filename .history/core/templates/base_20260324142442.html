<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Elena Voss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root[data-theme="dark"] { --bg: #0a0f1c; --text: #f1f5f9; --card: rgba(15,23,42,0.85); }
        :root[data-theme="light"] { --bg: #f8fafc; --text: #0f172a; --card: rgba(255,255,255,0.92); }
        body { background: var(--bg); color: var(--text); transition: all 0.5s cubic-bezier(0.4,0,0.2,1); }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.7s cubic-bezier(0.4,0,0.2,1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: var(--card); backdrop-filter: blur(16px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
        .nav-link.active { position: relative; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: linear-gradient(to right, #f97316, #fbbf24); }
    </style>
</head>
<body class="font-sans overflow-x-hidden">

<!-- NAVIGATION (same as before but with active class support) -->
<nav class="fixed top-4 left-1/2 -translate-x-1/2 z-50 glass rounded-3xl shadow-2xl px-8 py-4 flex items-center gap-8 border border-white/10">
    <div class="text-2xl font-bold tracking-tight">Portfolio.</div>
    <div class="flex gap-8 text-lg font-medium">
        <a onclick="switchSection('home')" class="nav-link cursor-pointer hover:text-orange-500 transition-colors">Home</a>
        <a onclick="switchSection('about')" class="nav-link cursor-pointer hover:text-orange-500 transition-colors">About</a>
        <a onclick="switchSection('skills')" class="nav-link cursor-pointer hover:text-orange-500 transition-colors">Skills</a>
        <a onclick="switchSection('projects')" class="nav-link cursor-pointer hover:text-orange-500 transition-colors">Projects</a>
        <a onclick="switchSection('contact')" class="nav-link cursor-pointer hover:text-orange-500 transition-colors">Contact</a>
    </div>
    <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" id="theme-toggle" class="text-3xl hover:rotate-12 transition-transform">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button onclick="switchSection('projects')" 
                class="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white px-8 py-3 rounded-3xl font-semibold shadow-lg hover:shadow-orange-500/50 transition-all active:scale-95">
            Hire Me
        </button>
    </div>
</nav>

<!-- SECTIONS -->
<div id="home" class="section active">{% include 'sections/home.html' %}</div>
<div id="about" class="section">{% include 'sections/about.html' %}</div>
<div id="skills" class="section">{% include 'sections/skills.html' %}</div>
<div id="projects" class="section">{% include 'sections/projects.html' %}</div>
<div id="contact" class="section">{% include 'sections/contact.html' %}</div>

<script>
// Global variables
let map;
const googleMapsKey = "{{ google_maps_key }}";

// Switch sections
function switchSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    // Highlight nav
    document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
    const activeLink = Array.from(document.querySelectorAll('.nav-link')).find(l => l.getAttribute('onclick').includes(id));
    if (activeLink) activeLink.classList.add('active');
}

// Theme toggle
function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const newTheme = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    document.getElementById('theme-toggle').innerHTML = newTheme === 'dark' 
        ? '<i class="fa-solid fa-moon"></i>' 
        : '<i class="fa-solid fa-sun"></i>';
}

// Init saved theme
if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('theme-toggle').innerHTML = '<i class="fa-solid fa-sun"></i>';
}

// Tailwind
tailwind.config = { content: ["./templates/**/*.html"] };
</script>

</body>
</html>
