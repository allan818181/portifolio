<div class="min-h-screen px-8 pt-20 pb-12">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-6xl font-bold text-center mb-3">Get In Touch</h2>
        <p class="text-center text-xl text-slate-400 mb-16">Let’s discuss your next big idea</p>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <!-- Left: Form + Illustration -->
            <div class="lg:col-span-7 glass rounded-3xl p-10">
                <div class="flex flex-col md:flex-row gap-12">
                    <!-- Cute Character -->
                    <div class="flex-shrink-0 text-center">
                        <img src="https://picsum.photos/id/1011/320/420" alt="Elena Voss" 
                             class="rounded-3xl shadow-2xl mx-auto">
                        <div class="mt-6 text-6xl">💬</div>
                    </div>
                    
                    <!-- Form -->
                    <div class="flex-1 space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <input type="text" id="first_name" placeholder="First Name" 
                                       class="w-full bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg transition">
                            </div>
                            <div>
                                <input type="text" id="last_name" placeholder="Last Name" 
                                       class="w-full bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg transition">
                            </div>
                        </div>
                        
                        <input type="email" id="email" placeholder="Email Address" 
                               class="w-full bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg transition">
                        
                        <input type="tel" id="phone" placeholder="Phone Number (Optional)" 
                               class="w-full bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg transition">
                        
                        <textarea id="message" rows="6" placeholder="Tell me about your project..." 
                                  class="w-full bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg resize-none transition"></textarea>
                        
                        <button onclick="submitContactForm()" 
                                id="send-btn"
                                class="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white py-6 rounded-3xl text-xl font-semibold flex items-center justify-center gap-3 transition-all active:scale-95">
                            <span id="btn-text">Send Message</span>
                            <i id="btn-icon" class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Map -->
            <div class="lg:col-span-5">
                <div class="glass rounded-3xl p-8 h-full flex flex-col">
                    <div class="flex items-center gap-4 mb-6">
                        <i class="fa-solid fa-map-pin text-4xl text-orange-500"></i>
                        <div>
                            <h3 class="text-3xl font-semibold">Find Me Here</h3>
                            <p class="text-slate-400">Dar es Salaam, Tanzania</p>
                        </div>
                    </div>
                    <div id="google-map" class="flex-1 rounded-3xl overflow-hidden border border-white/10"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function initMap() {
    const location = { lat: -6.7924, lng: 39.2083 };
    const map = new google.maps.Map(document.getElementById("google-map"), {
        zoom: 15,
        center: location,
        mapTypeControl: false,
        streetViewControl: true,
        fullscreenControl: true,
        styles: [
            { featureType: "poi", stylers: [{ visibility: "off" }] }
        ]
    });
    
    new google.maps.Marker({
        position: location,
        map: map,
        title: "Elena Voss Studio",
        icon: "https://img.icons8.com/fluency/48/butterfly.png"
    });
}

async function submitContactForm() {
    const btn = document.getElementById('send-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    
    // Disable button
    btn.disabled = true;
    btnText.textContent = 'Sending...';
    btnIcon.className = 'fa-solid fa-spinner fa-spin';
    
    const formData = {
        name: (document.getElementById('first_name').value + ' ' + document.getElementById('last_name').value).trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        message: document.getElementById('message').value.trim()
    };

    try {
        const res = await fetch('/send-message/', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify(formData)
        });

        const data = await res.json();

        if (data.status === 'success') {
            showToast(data.message, 'success');
            // Clear form
            document.querySelectorAll('#contact input, #contact textarea').forEach(el => el.value = '');
        } else {
            showToast(data.message || 'Something went wrong.', 'error');
        }
    } catch (err) {
        showToast('Failed to send message. Please check your connection.', 'error');
    } finally {
        // Reset button
        btn.disabled = false;
        btnText.textContent = 'Send Message';
        btnIcon.className = 'fa-solid fa-paper-plane';
    }
}

function showToast(message, type) {
    const toast = document.createElement('div');
    const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
    
    toast.style.cssText = `position:fixed; bottom:40px; right:40px; ${bgColor}; color:white; padding:18px 28px; border-radius:9999px; box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.3); z-index:99999; display:flex; align-items:center; gap:12px; font-weight:500;`;
    toast.innerHTML = `
        ${type === 'success' ? '✅' : '⚠️'} 
        <span>${message}</span>
    `;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.transition = 'all 0.4s';
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        setTimeout(() => toast.remove(), 400);
    }, 4500);
}
</script>
