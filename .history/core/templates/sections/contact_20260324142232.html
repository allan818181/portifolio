<div class="min-h-screen px-8 pt-20 pb-12">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-6xl font-bold text-center mb-3">Get In Touch</h2>
        <p class="text-center text-xl text-slate-400 mb-16">Let’s discuss your next big idea</p>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <!-- Left: Illustration + form -->
            <div class="lg:col-span-7 glass rounded-3xl p-10">
                <div class="flex flex-col md:flex-row gap-12">
                    <!-- Cute character -->
                    <div class="flex-shrink-0">
                        <img src="https://picsum.photos/id/1011/320/400" alt="Elena" class="rounded-3xl shadow-2xl">
                        <div class="text-6xl absolute -mt-12 ml-8">📱</div>
                    </div>
                    
                    <!-- Form -->
                    <div class="flex-1 space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <input type="text" id="first_name" placeholder="First Name" 
                                   class="bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg">
                            <input type="text" id="last_name" placeholder="Last Name" 
                                   class="bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg">
                        </div>
                        <input type="email" id="email" placeholder="Email Address" 
                               class="w-full bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg">
                        <input type="tel" id="phone" placeholder="Phone Number" 
                               class="w-full bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg">
                        <textarea id="message" rows="5" placeholder="Your Message" 
                                  class="w-full bg-white/10 border border-white/20 focus:border-orange-500 rounded-3xl px-6 py-5 outline-none text-lg resize-none"></textarea>
                        
                        <button onclick="submitContactForm()" 
                                class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white py-6 rounded-3xl text-xl font-semibold hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
                            Send Message
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Map -->
            <div class="lg:col-span-5">
                <div class="glass rounded-3xl p-8 h-full flex flex-col">
                    <div class="flex items-center gap-4 mb-6">
                        <i class="fa-solid fa-map-pin text-4xl text-orange-500"></i>
                        <div>
                            <h3 class="text-3xl font-semibold">Find Me in Dar es Salaam</h3>
                            <p class="text-slate-400">Tanzania • East Africa</p>
                        </div>
                    </div>
                    <!-- Google Map Container -->
                    <div id="google-map" class="flex-1 rounded-3xl overflow-hidden border border-white/10"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function initMap() {
    const location = { lat: -6.7924, lng: 39.2083 };
    map = new google.maps.Map(document.getElementById("google-map"), {
        zoom: 14,
        center: location,
        styles: [
            { featureType: "all", elementType: "labels", stylers: [{ visibility: "off" }] } // clean modern look
        ]
    });
    new google.maps.Marker({
        position: location,
        map: map,
        title: "Elena Voss • Dar es Salaam",
        icon: "https://img.icons8.com/fluency/48/butterfly.png"  // cute butterfly pin
    });
}

// Submit form (no email – just success toast)
function submitContactForm() {
    const formData = {
        name: document.getElementById('first_name').value + ' ' + document.getElementById('last_name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        message: document.getElementById('message').value
    };

    fetch('/send-message/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
        body: JSON.stringify(formData)
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed; bottom:30px; right:30px; background:#10b981; color:white; padding:20px 30px; border-radius:9999px; box-shadow:0 10px 15px -3px rgb(16 185 129); z-index:9999;';
            toast.innerHTML = `✅ ${data.message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
            
            // Clear form
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }
    });
}
</script>
